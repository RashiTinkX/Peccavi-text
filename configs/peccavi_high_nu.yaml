# configs/peccavi_high_nu.yaml
# Quality-prioritised PECCAVI: nu=0.6, lambda=0.4
# Run this to demonstrate that quality-detection tradeoff is controllable via nu.
# Compare results against peccavi_s7.json to show quality improves at small AUC cost.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.5
  theta_max: 8.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: true

agents:
  scriba_n_variants: 5

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 0.4
  nu_quality: 0.6
  generations: 50
  n_eval_samples: 200
