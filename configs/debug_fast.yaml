# configs/debug_fast.yaml
# Fast debug config — runs in ~5-10 min on GPU, ~30 min on CPU.
# Use for testing code changes before full runs.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.5
  theta_max: 8.0
  tournament_k: 8
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: true

agents:
  scriba_n_variants: 3

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 0.6
  nu_quality: 0.4
  mu_ppl: 0.1
  generations: 10
  n_eval_samples: 30
