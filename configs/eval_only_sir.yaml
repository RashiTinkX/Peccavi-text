# configs/eval_only_sir.yaml
# Eval-only SIR baseline — no training, just eval + attack survival curve.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  delta: 2.0
  gamma: 0.5
  entropy_threshold: 1.0

policy_learning:
  generations: 0
  n_eval_samples: 200
