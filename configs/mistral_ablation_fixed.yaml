# configs/mistral_ablation_fixed.yaml
# Ablation: fixed theta on Mistral-7B-Instruct-v0.3

model:
  backbone: "mistralai/Mistral-7B-Instruct-v0.3"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.1
  theta_max: 10.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: false

agents:
  scriba_n_variants: 10

policy_learning:
  alpha: 0.0
  gamma: 0.99
  lambda_wm: 0.6
  nu_quality: 0.4
  generations: 50
  n_eval_samples: 500
