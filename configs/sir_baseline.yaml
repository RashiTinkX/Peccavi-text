# configs/sir_baseline.yaml
# SIR (Entropy-Aware Watermarking) baseline configuration.
# Applies KGW-style green-list delta only at high-entropy token positions,
# preserving quality at low-entropy (near-deterministic) positions.
# API keys must NOT be stored here — set them as environment variables.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  delta: 2.0            # logit bias added to green tokens at high-entropy positions
  gamma: 0.5            # fraction of vocab in green list
  entropy_threshold: 1.0  # nats; positions with H > threshold are watermarked
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 4.0
  watermark_mode: "sir"

policy_learning:
  generations: 20
  n_eval_samples: 500

agents:
  scriba_n_variants: 10

success_criteria:
  watermark_retention_pct: 51
  detection_auc_roc: 0.90
  human_readability_min: 3.0
