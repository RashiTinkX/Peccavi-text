# configs/peccavi_attack_aware.yaml
# Attack-aware PECCAVI: adds back-translation survival to the REINFORCE reward.
# r = λ*S_eff + ν*quality - μ*PPL_penalty + ρ*survival_after_backtranslation
#
# MarianMT (Helsinki-NLP/opus-mt-en-fr + opus-mt-fr-en) runs on CPU alongside
# the LLM — no extra VRAM needed. First gen will be slow (~30s) while models load.
#
# Run: python main.py --mode train --config-file configs/peccavi_attack_aware.yaml \
#          --output results/peccavi_attack_aware_s7.json --seed 7

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.5
  theta_max: 8.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: true

agents:
  scriba_n_variants: 5

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 0.5
  nu_quality: 0.3
  mu_ppl: 0.0
  rho_survival: 0.2      # weight on back-translation survival term
  generations: 50
  n_eval_samples: 200
