# configs/kgw_baseline.yaml
# KGW baseline (Kirchenbauer et al. 2023) — fixed delta, no adaptive learning.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  delta: 2.0
  gamma: 0.5
  secret_key: "PECCAVI-SECRET"
  watermark_mode: "kgw"

agents:
  scriba_n_variants: 10

policy_learning:
  generations: 5
  n_eval_samples: 500

success_criteria:
  watermark_retention_pct: 51
  detection_auc_roc: 0.90
  human_readability_min: 3.0
