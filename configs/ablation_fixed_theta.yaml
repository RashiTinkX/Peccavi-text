# configs/ablation_fixed_theta.yaml
# Ablation: fixed theta (alpha=0 disables REINFORCE updates).
# Tests whether adaptive theta learning actually helps vs a static watermark.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.1
  theta_max: 10.0
  tournament_k: 16
  secret_key: "AIISC-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"

agents:
  scriba_n_variants: 10

policy_learning:
  alpha: 0.0          # disabled — theta stays fixed
  gamma: 0.99
  lambda_wm: 0.6
  nu_quality: 0.4
  generations: 5
  n_eval_samples: 100

success_criteria:
  watermark_retention_pct: 51
  detection_auc_roc: 0.90
  human_readability_min: 3.0
