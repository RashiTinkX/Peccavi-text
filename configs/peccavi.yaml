# configs/peccavi.yaml
# PECCAVI – Watermarking and Content Authenticity configuration
# API keys must NOT be stored here — set them as environment variables:
#   export OPENAI_API_KEY="..."
#   export ANTHROPIC_API_KEY="..."
#   export DEEPSEEK_API_KEY="..."

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"


baseline_models:
  - name: "LLaMa-2"
    backbone: "meta-llama/Llama-2-7b-chat-hf"
    backend: "transformers"

  - name: "DeepSeek"
    backbone: "deepseek-chat"
    backend: "openai"
    api_key: null          # reads from DEEPSEEK_API_KEY env var

  - name: "GPT-4"
    backbone: "gpt-4o"
    backend: "openai"
    api_key: null          # reads from OPENAI_API_KEY env var

  #- name: "Claude-3"
  #  backbone: "claude-sonnet-4-6"
  #  backend: "anthropic"
  #  api_key: null         # reads from ANTHROPIC_API_KEY env var

watermarking:
  theta_init: 2.0
  theta_min: 0.1
  theta_max: 10.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"

agents:
  scriba_n_variants: 10
  praeco_prompt_pool: "default"

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 0.6
  nu_quality: 0.4
  generations: 20
  n_eval_samples: 100

success_criteria:
  watermark_retention_pct: 51   # above-chance survival under back-translation
  detection_auc_roc: 0.90
  human_readability_min: 3.0    # appropriate for technical AI content
