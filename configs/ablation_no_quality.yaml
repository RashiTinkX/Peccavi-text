# configs/ablation_no_quality.yaml
# Ablation: no quality reward (nu=0, lambda=1.0).
# Tests whether quality-aware reward helps vs pure watermark optimisation.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: false
  device: "cuda"

watermarking:
  theta_init: 2.0
  theta_min: 0.1
  theta_max: 10.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"

agents:
  scriba_n_variants: 10

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 1.0
  nu_quality: 0.0
  generations: 50
  n_eval_samples: 500

success_criteria:
  watermark_retention_pct: 51
  detection_auc_roc: 0.90
  human_readability_min: 3.0
