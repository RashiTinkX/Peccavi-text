# configs/mistral_ablation_no_watermark.yaml
# Ablation: no watermark baseline on Mistral-7B-Instruct-v0.3

model:
  backbone: "mistralai/Mistral-7B-Instruct-v0.3"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  watermark_mode: "none"
  secret_key: "PECCAVI-SECRET"

agents:
  scriba_n_variants: 10

policy_learning:
  generations: 50
  n_eval_samples: 500
