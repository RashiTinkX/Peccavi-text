# configs/test_quick.yaml
# Smoke-test config: runs 2 training gens + 10 eval samples.
# Exercises the full pipeline (MarianMT attack-aware path included).
# Should complete in ~5 minutes. Not for paper results.
#
# Run: python main.py --mode train --config-file configs/test_quick.yaml \
#          --output results/test_quick.json --seed 42

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.5
  theta_max: 8.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: false

agents:
  scriba_n_variants: 2

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 0.5
  nu_quality: 0.3
  mu_ppl: 0.0
  rho_survival: 0.2      # keep enabled so MarianMT path is tested
  generations: 2
  n_eval_samples: 10
