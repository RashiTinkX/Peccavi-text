# configs/eval_only_peccavi.yaml
# Eval-only run using trained theta from seed 7 (theta=5.5946, w learned).
# generations=0 skips training — goes straight to eval + attack survival.
# Produces attack_survival_by_threshold for the paper survival curve.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 5.5946
  theta_min: 0.5
  theta_max: 8.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: true

agents:
  scriba_n_variants: 5

policy_learning:
  alpha: 0.0
  gamma: 0.99
  lambda_wm: 0.6
  nu_quality: 0.4
  generations: 0
  n_eval_samples: 200
