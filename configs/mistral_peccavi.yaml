# configs/mistral_peccavi.yaml
# PECCAVI full run on Mistral-7B-Instruct-v0.3

model:
  backbone: "mistralai/Mistral-7B-Instruct-v0.3"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  theta_init: 2.0
  theta_min: 0.5
  theta_max: 8.0
  tournament_k: 16
  secret_key: "PECCAVI-SECRET"
  detection_threshold: 0.52
  watermark_mode: "peccavi"
  adaptive_theta: true

agents:
  scriba_n_variants: 10

policy_learning:
  alpha: 0.05
  gamma: 0.99
  lambda_wm: 0.6
  nu_quality: 0.4
  generations: 150
  n_eval_samples: 500

success_criteria:
  watermark_retention_pct: 51
  detection_auc_roc: 0.90
  human_readability_min: 3.0
