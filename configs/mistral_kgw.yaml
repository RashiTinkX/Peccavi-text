# configs/mistral_kgw.yaml
# KGW baseline on Mistral-7B-Instruct-v0.3
# Backbone only — KGW params read from configs/kgw_baseline.yaml

model:
  backbone: "mistralai/Mistral-7B-Instruct-v0.3"
  backend: "transformers"
  api_key: null
  load_in_4bit: true
  device: "auto"

watermarking:
  delta: 2.0
  gamma: 0.5

policy_learning:
  generations: 20
  n_eval_samples: 500
