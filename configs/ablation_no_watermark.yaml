# configs/ablation_no_watermark.yaml
# Ablation: no watermark — measures AUC-ROC of random baseline.
# Expected AUC-ROC ~0.50 (chance). Confirms detector is not cheating.

model:
  backbone: "meta-llama/Llama-2-7b-chat-hf"
  backend: "transformers"
  api_key: null
  load_in_4bit: false
  device: "cuda"

watermarking:
  watermark_mode: "none"
  secret_key: "PECCAVI-SECRET"

agents:
  scriba_n_variants: 10

policy_learning:
  generations: 50
  n_eval_samples: 500

success_criteria:
  watermark_retention_pct: 51
  detection_auc_roc: 0.90
  human_readability_min: 3.0
